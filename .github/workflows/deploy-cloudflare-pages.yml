

name: Deploy to Cloudflare Pages
 
# Configuring Triggers
on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows you to manually trigger the deployment from GitHub
  
# Required permissions
permissions:
  contents: read
  deployments: write
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check the dist/ folder
        run: |
          if [ ! -d “dist” ]; then
            echo “Error: The dist/ folder was not generated correctly.”
            exit 1
          fi
          
      - name: Build the app
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
